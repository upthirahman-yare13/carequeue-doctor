<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>CareQueue | Dhakhtarka - Prescription</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; padding: 20px; color: #1e293b; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 700px; margin: auto; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        h2 { text-align: center; color: #2563eb; }
        
        /* Qaybta Print-ga oo kaliya u muuqanaysa warqadda */
        #prescription-print { display: none; padding: 40px; border: 2px solid #000; background: white; color: black; }
        .header-print { text-align: center; border-bottom: 2px solid #000; margin-bottom: 20px; }
        
        .btn-print { background: #000; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        @media print {
            body * { visibility: hidden; }
            #prescription-print, #prescription-print * { visibility: visible; }
            #prescription-print { display: block; position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="card" id="doctor-form">
        <h2>BAARITAANKA BUKAANKA</h2>
        <div id="patient-info-display" style="background: #e2e8f0; padding: 10px; border-radius: 8px; margin-bottom: 15px;">
            <p>Sugaya bukaan...</p>
        </div>

        <div class="grid-inputs">
            <input type="number" id="pAge" placeholder="Da'da (Age)">
            <input type="text" id="pSex" placeholder="Lab/Dheddig (Gender)">
            <input type="text" id="pWeight" placeholder="Miisaanka (Weight)">
            <input type="text" id="pBP" placeholder="Dhiig karka (B.P)">
        </div>
        
        <textarea id="pDiagnosis" placeholder="Cudurka la helay (Diagnosis)..." rows="2"></textarea>
        <textarea id="pMedication" placeholder="Daawooyinka loo qoray (Prescription)..." rows="4"></textarea>
        <textarea id="pNote" placeholder="Talooyinka dhakhtarka (Doctor's Advice)..." rows="2"></textarea>
        
        <button class="btn-print" onclick="preparePrint()">PRINT & DHAMMAYSTIR</button>
    </div>

    <div id="prescription-print">
        <div class="header-print">
            <h1>CAREQUEUE MEDICAL CENTER</h1>
            <p>Mogadishu, Somalia | Tel: +252 61XXXXXXX</p>
            <h3>MEDICAL PRESCRIPTION</h3>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <p><strong>Bukaanka:</strong> <span id="printName"></span></p>
            <p><strong>Taariikhda:</strong> <span id="printDate"></span></p>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr;">
            <p><strong>Da'da:</strong> <span id="printAge"></span></p>
            <p><strong>Jinsiga:</strong> <span id="printSex"></span></p>
            <p><strong>Miisaanka:</strong> <span id="printWeight"></span></p>
        </div>
        <hr>
        <h4>DIAGNOSIS:</h4>
        <p id="printDiagnosis"></p>
        <hr>
        <h4>PRESCRIPTION (Rx):</h4>
        <p id="printMedication" style="white-space: pre-wrap; font-size: 18px; line-height: 1.6;"></p>
        <hr>
        <h4>ADVICE:</h4>
        <p id="printNote"></p>
        <div style="margin-top: 50px; text-align: right;">
            <p>_______________________</p>
            <p>Dhakhtarka Saxiixiisa</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://carequeue-manager-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentPatientKey = null;
        let currentPatientData = null;

        // 1. Soo kicinta Bukaanka u horeeya ee Safka
        db.ref('live_queue').on('value', (snap) => {
            const data = snap.val();
            const display = document.getElementById('patient-info-display');
            if (data) {
                currentPatientKey = Object.keys(data)[0];
                currentPatientData = data[currentPatientKey];
                display.innerHTML = `<strong>Bukaanka hadda:</strong> ${currentPatientData.name} | <strong>Cabashada:</strong> ${currentPatientData.complaint}`;
            } else {
                display.innerHTML = "Ma jiro bukaan hadda sugaya.";
                currentPatientKey = null;
            }
        });

        // 2. Diyaarinta Print-ga iyo Kaydinta
        function preparePrint() {
            if (!currentPatientKey) { alert("Ma jiro bukaan la doortay!"); return; }

            const age = document.getElementById('pAge').value;
            const diagnosis = document.getElementById('pDiagnosis').value;
            const meds = document.getElementById('pMedication').value;

            if (!age || !meds) { alert("Fadlan buuxi Da'da iyo Daawooyinka!"); return; }

            // Buuxi xogta warqadda print-ga
            document.getElementById('printName').innerText = currentPatientData.name;
            document.getElementById('printDate').innerText = new Date().toLocaleDateString();
            document.getElementById('printAge').innerText = age;
            document.getElementById('printSex').innerText = document.getElementById('pSex').value;
            document.getElementById('printWeight').innerText = document.getElementById('pWeight').value;
            document.getElementById('printDiagnosis').innerText = diagnosis;
            document.getElementById('printMedication').innerText = meds;
            document.getElementById('printNote').innerText = document.getElementById('pNote').value;

            // Kaydi History-ga dhammaystiran (Halkan xogtu dakhli ahaan iyo taariikh ahaanba u galaysaa)
            db.ref('patient_history').push({
                name: currentPatientData.name,
                age: age,
                diagnosis: diagnosis,
                medication: meds,
                date: new Date().toLocaleDateString()
            });

            // Ka saar safka 'live_queue' maadaama uu dhammaaday
            db.ref('live_queue/' + currentPatientKey).remove();

            // Fur daaqadda Print-ga
            window.print();
            
            // Nadiifi foomka ka dib print-ga
            location.reload();
        }
    </script>
</body>
</html>
