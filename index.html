<div class="card">
    <h3>Magaca: ${data.name}</h3>
    <p><strong>Cabashada:</strong> ${data.complaint}</p>
    
    <textarea id="medication" placeholder="Daawooyinka loo qoray..." rows="2" style="width:100%;"></textarea>
    <textarea id="labTest" placeholder="Baaritaanka Shaybaarka..." rows="2" style="width:100%;"></textarea>
    
    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button onclick="sendToPharmacy()" style="background: green; color: white; border: none; padding: 10px; flex: 1;">U dir Farmashiyaha</button>
        <button onclick="sendToLab()" style="background: orange; color: white; border: none; padding: 10px; flex: 1;">U dir Shaybaarka</button>
    </div>
</div>

<script>
    // Reception-ka ka saar, laakiin xogta u dir meesha ku habboon
    function sendToPharmacy() {
        const med = document.getElementById('medication').value;
        const pName = document.getElementById('pName').value; // Sidoo kale kasoo qaad magaca
        if(med) {
            db.ref('pharmacy_queue').push({ name: '${data.name}', prescription: med });
            db.ref('live_queue').remove();
            alert("Farmashiyaha ayaa loo diray!");
        }
    }

    function sendToLab() {
        const lab = document.getElementById('labTest').value;
        if(lab) {
            db.ref('lab_queue').push({ name: '${data.name}', test: lab });
            db.ref('live_queue').remove();
            alert("Shaybaarka ayaa loo diray!");
        }
    }
</script>
