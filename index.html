<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>CareQueue | Doctor Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        /* Login Overlay Styles */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: #1e293b; padding: 40px; border-radius: 12px; width: 350px; text-align: center; border: 1px solid #2563eb; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; }
        .login-box button { background: #2563eb; color: white; padding: 12px; width: 100%; border: none; border-radius: 6px; cursor: pointer; }

        body { background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 850px; margin: auto; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        h2 { text-align: center; color: #2563eb; text-transform: uppercase; }
        .section-title { background: #e2e8f0; padding: 8px; font-weight: bold; margin-top: 15px; border-radius: 4px; }
        .btn-action { background: #2563eb; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: white;">DOCTOR LOGIN</h2>
            <input type="email" id="docEmail" placeholder="Email">
            <input type="password" id="docPass" placeholder="Password">
            <button onclick="handleDocLogin()">GALO</button>
        </div>
    </div>

    <div class="card" id="doctor-interface" style="display: none;">
        <h2>Medical Assessment & Prescription</h2>
        <div id="active-patient" style="background: #dcfce7; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; color: #166534;">
            Sugaya bukaan ka socda Reception-ka...
        </div>
        <button class="btn-action" onclick="generateReport()">PRINT MEDICAL REPORT</button>
        <button onclick="firebase.auth().signOut().then(() => location.reload())" style="background:red; border:none; color:white; padding:10px; width:100%; margin-top:10px; cursor:pointer;">LOGOUT</button>
    </div>

    <script>
        const firebaseConfig = { 
            databaseURL: "https://carequeue-manager-default-rtdb.firebaseio.com",
            projectId: "carequeue-manager"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // Login Logic
        function handleDocLogin() {
            const email = document.getElementById('docEmail').value;
            const pass = document.getElementById('docPass').value;
            auth.signInWithEmailAndPassword(email, pass)
            .then(() => { location.reload(); })
            .catch(err => alert("Khalad: " + err.message));
        }

        // Check Auth
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('doctor-interface').style.display = 'block';
                loadPatient();
            }
        });

        function loadPatient() {
            db.ref('live_queue').on('value', (snap) => {
                const data = snap.val();
                const div = document.getElementById('active-patient');
                if (data) {
                    activeData = data;
                    div.innerHTML = "BUKAANKA: " + activeData.name + " (Tikidh: " + (activeData.num || 'N/A') + ")";
                } else {
                    div.innerHTML = "Ma jiro bukaan hadda sugaya.";
                    activeData = null;
                }
            });
        }
        // ... (Halkan ka sii wad shaqadaada generateReport iyo wixii kale)
    </script>
</body>
</html>
